<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chip — Rule-Based Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-hover: #22223a;
      --primary: #6c63ff;
      --primary-hover: #5a52d5;
      --primary-glow: rgba(108, 99, 255, 0.25);
      --text: #e8e8f0;
      --text-muted: #9090a8;
      --user-bubble: #6c63ff;
      --bot-bubble: #252542;
      --border: rgba(255, 255, 255, 0.06);
      --radius: 16px;
      --radius-sm: 10px;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat-container {
      width: 100%;
      max-width: 520px;
      height: 90vh;
      max-height: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 80px var(--primary-glow);
    }

    /* ── Header ── */
    .chat-header {
      padding: 20px 24px;
      background: linear-gradient(135deg, #6c63ff 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bot-avatar {
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .header-info p {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .message.bot .message-avatar {
      background: rgba(108, 99, 255, 0.2);
    }

    .message.user .message-avatar {
      background: rgba(108, 99, 255, 0.15);
    }

    .bubble {
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: #fff;
      border-top-right-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input ── */
    .chat-input {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      background: rgba(0, 0, 0, 0.2);
    }

    .chat-input input {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .chat-input input::placeholder {
      color: var(--text-muted);
    }

    .chat-input input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .chat-input button {
      padding: 14px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-input button:hover {
      background: var(--primary-hover);
    }

    .chat-input button:active {
      transform: scale(0.96);
    }

    .chat-input button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 12px;
      background: rgba(0, 0, 0, 0.15);
    }

    .suggestion-chip {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .suggestion-chip:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--primary);
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .chat-container {
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }
      body { padding: 0; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- Header -->
    <div class="chat-header">
      <div class="bot-avatar">🤖</div>
      <div class="header-info">
        <h1>Chip</h1>
        <p><span class="status-dot"></span>Online — Rule-Based Chatbot</p>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-messages" id="messages">
      <div class="message bot">
        <div class="message-avatar">🤖</div>
        <div class="bubble">Hey! I'm <strong>Chip</strong>, a rule-based chatbot built with Flask. Try asking me a joke, about AI, Python, or anything! 😊</div>
      </div>
    </div>

    <!-- Suggestions -->
    <div class="suggestions">
      <button class="suggestion-chip" onclick="sendSuggestion('Tell me a joke')">😂 Tell me a joke</button>
      <button class="suggestion-chip" onclick="sendSuggestion('What is AI?')">🧠 What is AI?</button>
      <button class="suggestion-chip" onclick="sendSuggestion('Tell me about Python')">🐍 About Python</button>
      <button class="suggestion-chip" onclick="sendSuggestion('What can you do?')">💡 What can you do?</button>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
      <button id="sendBtn" onclick="sendMessage()">
        <span>Send</span>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Enter key support
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function appendMessage(text, sender) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = sender === 'user' ? '👤' : '🤖';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = text;

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(bubble);
      messagesEl.appendChild(msgDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message bot';
      msgDiv.id = 'typing';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '🤖';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';

      msgDiv.appendChild(avatar);
      msgDiv.appendChild(indicator);
      messagesEl.appendChild(msgDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    function sendSuggestion(text) {
      inputEl.value = text;
      sendMessage();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      appendMessage(text, 'user');
      inputEl.value = '';
      inputEl.disabled = true;
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        removeTyping();
        appendMessage(data.response, 'bot');
      } catch (err) {
        removeTyping();
        appendMessage('Oops! Could not reach the server. Is Flask running?', 'bot');
      }

      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // Focus input on load
    inputEl.focus();
  </script>
</body>
</html>
